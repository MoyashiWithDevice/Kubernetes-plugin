apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: detective-agent
  namespace: detective
  labels:
    app.kubernetes.io/name: detective
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: detective
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: detective
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: detective-aggregator
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: bababa2547/kubectl-detective:latest
          imagePullPolicy: Always
          command:
            - /usr/local/bin/kubectl-detective
            - agent
            - --aggregator=detective-aggregator.detective.svc.cluster.local:50051
            - --interval=5s
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            capabilities:
              add:
                - BPF
                - NET_ADMIN
                - PERFMON
                - IPC_LOCK
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      tolerations:
        - operator: Exists
      terminationGracePeriodSeconds: 5
