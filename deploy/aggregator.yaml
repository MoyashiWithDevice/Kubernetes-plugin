apiVersion: v1
kind: ServiceAccount
metadata:
  name: detective-aggregator
  namespace: detective
  labels:
    app.kubernetes.io/name: detective
    app.kubernetes.io/component: aggregator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: detective-aggregator
  labels:
    app.kubernetes.io/name: detective
    app.kubernetes.io/component: aggregator
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: detective-aggregator
  labels:
    app.kubernetes.io/name: detective
    app.kubernetes.io/component: aggregator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: detective-aggregator
subjects:
  - kind: ServiceAccount
    name: detective-aggregator
    namespace: detective
---
apiVersion: v1
kind: Namespace
metadata:
  name: detective
  labels:
    app.kubernetes.io/name: detective
---
apiVersion: v1
kind: Service
metadata:
  name: detective-aggregator
  namespace: detective
  labels:
    app.kubernetes.io/name: detective
    app.kubernetes.io/component: aggregator
spec:
  selector:
    app.kubernetes.io/name: detective
    app.kubernetes.io/component: aggregator
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: detective-aggregator
  namespace: detective
  labels:
    app.kubernetes.io/name: detective
    app.kubernetes.io/component: aggregator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: detective
      app.kubernetes.io/component: aggregator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: detective
        app.kubernetes.io/component: aggregator
    spec:
      serviceAccountName: detective-aggregator
      containers:
        - name: aggregator
          image: kubectl-detective:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/kubectl-detective
            - aggregator
            - --listen=:50051
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 30
      terminationGracePeriodSeconds: 10
